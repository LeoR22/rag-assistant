services:

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: bancolombia-mcp-server
    ports:
      - "8000:8000"
    volumes:
      - ./mcp-server/data:/app/data
      - ./scraper/data:/app/scraper_data:ro
    env_file:
      - ./mcp-server/.env
    environment:
      - RAW_DATA_PATH=/app/scraper_data/raw
      - CHROMA_PATH=/app/data/chroma
      - MCP_TRANSPORT=streamable-http
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: bancolombia-agent
    ports:
      - "8001:8001"
    volumes:
      - ./agent/data:/app/data
    env_file:
      - ./agent/.env
    environment:
      - MCP_SERVER_URL=http://mcp-server:8000/mcp
      - LONG_TERM_DB_PATH=/app/data/memory.db
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bancolombia-frontend
    ports:
      - "3000:3000"
    depends_on:
      agent:
        condition: service_healthy
    restart: unless-stopped