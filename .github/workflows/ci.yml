name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  lint-scraper:
    name: Lint & Test Scraper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: ./scraper
        run: uv sync --frozen

      - name: Run tests
        working-directory: ./scraper
        run: uv run pytest tests/ -v --tb=short || true

  lint-mcp-server:
    name: Lint & Test MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: ./mcp-server
        run: uv sync --frozen

      - name: Run tests
        working-directory: ./mcp-server
        run: uv run pytest tests/ -v --tb=short || true

  lint-agent:
    name: Lint & Test Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: ./agent
        run: uv sync --frozen

      - name: Run tests
        working-directory: ./agent
        run: uv run pytest tests/ -v --tb=short || true

  lint-frontend:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build
        working-directory: ./frontend
        run: npm run build

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [lint-scraper, lint-mcp-server, lint-agent, lint-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Create env files
        run: |
          cp mcp-server/.env.example mcp-server/.env
          cp agent/.env.example agent/.env
          cp scraper/.env.example scraper/.env

      - name: Build MCP Server
        run: docker build -t bancolombia-mcp-server ./mcp-server

      - name: Build Agent
        run: docker build -t bancolombia-agent ./agent

      - name: Build Frontend
        run: docker build -t bancolombia-frontend ./frontend