name: Scraper Pipeline

on:
  schedule:
    - cron: '0 2 * * *'  # Todos los días a las 2am
  workflow_dispatch:      # Ejecutar manualmente desde GitHub

jobs:
  scrape-and-index:
    name: Scrape, Index and Commit
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      # ── Scraper ────────────────────────────────────────
      - name: Install scraper dependencies
        working-directory: ./scraper
        run: uv sync --frozen

      - name: Install Playwright
        working-directory: ./scraper
        run: uv run crawl4ai-setup

      - name: Run scraper
        working-directory: ./scraper
        env:
          BASE_URL: https://www.bancolombia.com/personas
          MIN_PAGES: 60
          DISCOVERY_BATCH: 30
          OUTPUT_DIR: data/raw
          PAGE_TIMEOUT: 60000
          LOG_LEVEL: INFO
        run: uv run python src/main.py

      # ── Indexer ────────────────────────────────────────
      - name: Install mcp-server dependencies
        working-directory: ./mcp-server
        run: uv sync --frozen

      - name: Run indexer
        working-directory: ./mcp-server
        env:
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          GITHUB_MODELS_URL: https://models.inference.ai.azure.com
          EMBEDDING_MODEL: text-embedding-3-large
          EMBEDDING_DIMENSION: 3072
          CHROMA_PATH: data/chroma
          CHROMA_COLLECTION: bancolombia
          RAW_DATA_PATH: ../scraper/data/raw
          LOG_LEVEL: INFO
        run: uv run python src/indexer.py

      # ── Commit datos actualizados ──────────────────────
      - name: Commit updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/data/raw/
          git add mcp-server/data/chroma/
          git diff --staged --quiet || git commit -m "data: update scraped and indexed data [$(date +'%Y-%m-%d')]"
          git push